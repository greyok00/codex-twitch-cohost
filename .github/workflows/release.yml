name: build-and-release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ''
            release_files: src-tauri/target/release/greyok-cohost-*-macos.dmg
          - platform: ubuntu-22.04
            args: ''
            release_files: src-tauri/target/release/greyok-cohost-*-linux-x64.AppImage
          - platform: windows-latest
            args: ''
            release_files: src-tauri/target/release/greyok-cohost-*-windows-x64.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libgtk-3-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Normalize artifact name (Linux AppImage)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-dev}"
          APPIMAGE="$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' | head -n1 || true)"
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage produced" >&2
            exit 1
          fi
          OUT="src-tauri/target/release/greyok-cohost-${TAG}-linux-x64.AppImage"
          cp "$APPIMAGE" "$OUT"
          chmod +x "$OUT"
          test -x "$OUT"

      - name: Normalize artifact name (macOS DMG)
        if: matrix.platform == 'macos-latest'
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-dev}"
          DMG="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' | head -n1 || true)"
          if [ -z "$DMG" ]; then
            echo "No DMG produced" >&2
            exit 1
          fi
          cp "$DMG" "src-tauri/target/release/greyok-cohost-${TAG}-macos.dmg"

      - name: Normalize artifact name (Windows EXE, non-setup)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if (-not $tag) { $tag = "dev" }
          $src = "src-tauri/target/release/twitch-cohost-bot.exe"
          if (!(Test-Path $src)) { throw "Missing portable EXE at $src" }
          Copy-Item $src "src-tauri/target/release/greyok-cohost-$tag-windows-x64.exe"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twitch-cohost-bot-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/release/greyok-cohost-*

      - name: Publish release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: false
          files: ${{ matrix.release_files }}
