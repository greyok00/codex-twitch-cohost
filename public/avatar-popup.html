<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cohost Avatar</title>
  <style>
    :root {
      --text: #f1f3f8;
      --muted: #a7adbb;
      --line: rgba(236, 240, 247, 0.22);
      --panel: rgba(34, 38, 46, 0.54);
      --panel-soft: rgba(56, 61, 73, 0.36);
      --mouth-x: 50%;
      --mouth-y: 74%;
      --mouth-w: 24%;
      --mouth-h: 10%;
      --brow-x: 50%;
      --brow-y: 33%;
      --brow-w: 12%;
      --brow-h: 2.2%;
      --brow-gap: 24%;
      --brow-lift: 0%;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: transparent;
      overflow: hidden;
    }
    .stage { width: 100%; height: 100%; display: grid; place-items: center; padding: 0; background: transparent; }
    .hint { position: fixed; top: 10px; left: 12px; font-size: 12px; color: var(--muted); z-index: 22; }
    .avatar-wrap {
      position: relative;
      border-radius: 0;
      overflow: visible;
      border: 0;
      background: transparent;
      box-shadow: none;
      max-width: min(86vw, 860px);
      max-height: calc(100vh - 48px);
    }
    #avatar { display: block; width: 100%; height: auto; max-height: calc(100vh - 48px); object-fit: contain; user-select: none; pointer-events: none; }
    .align-panel {
      position: fixed;
      right: 12px;
      top: 12px;
      width: min(360px, calc(100vw - 24px));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      background: linear-gradient(180deg, var(--panel-soft), var(--panel));
      backdrop-filter: saturate(170%) blur(20px);
      -webkit-backdrop-filter: saturate(170%) blur(20px);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.34);
      z-index: 21;
      max-height: calc(100vh - 24px);
      overflow: auto;
    }
    .group-title { margin-top: 10px; font-size: 12px; color: #d7dcea; letter-spacing: .04em; text-transform: uppercase; }
    .row { display: grid; grid-template-columns: 24px 1fr 56px; gap: 8px; align-items: center; margin-top: 8px; font-size: 12px; color: var(--muted); }
    .row select {
      background: rgba(17, 19, 24, 0.82);
      color: #f0f3f8;
      border: 1px solid rgba(222, 229, 241, .24);
      border-radius: 8px;
      padding: 6px 8px;
    }
    input[type="range"] {
      -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
      border-radius: 999px; background: rgba(132, 140, 154, 0.35);
      border: 1px solid rgba(225, 230, 240, 0.2);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%;
      border: 1px solid rgba(237, 241, 247, 0.48);
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(219,224,232,.92));
      box-shadow: 0 2px 8px rgba(0,0,0,.34); cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%; border: 1px solid rgba(237,241,247,.48);
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(219,224,232,.92));
      box-shadow: 0 2px 8px rgba(0,0,0,.34); cursor: pointer;
    }
    button {
      border: 1px solid var(--line); border-radius: 9px; padding: 7px 10px; color: var(--text);
      background: linear-gradient(180deg, rgba(145,152,164,.5), rgba(91,97,108,.74));
      box-shadow: 0 1px 0 rgba(255,255,255,.18) inset; cursor: pointer;
    }
    button:hover { filter: brightness(1.07); }
    .actions { display: flex; gap: 6px; margin-top: 8px; }
    .align-note { margin-top: 8px; font-size: 12px; color: var(--muted); }
    .ui-toggle-fab {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 25;
      border-color: rgba(228, 235, 245, 0.8);
      background: linear-gradient(180deg, rgba(190,199,214,.92), rgba(106,117,136,.95));
      color: #0e131a;
      font-weight: 700;
    }
    .ui-hidden .align-panel, .ui-hidden .hint { display: none; }

    .mouth {
      position: absolute;
      left: var(--mouth-x); top: var(--mouth-y);
      width: var(--mouth-w); height: var(--mouth-h);
      transform: translate(-50%, -50%) scaleY(var(--mouth-open, 0.25));
      transform-origin: center;
      border: 2px dashed rgba(255, 255, 255, 0.26);
      border-radius: 999px;
      background: radial-gradient(ellipse at center, rgba(20,6,8,.9), rgba(7,3,5,.84));
      box-shadow: 0 0 0 1px rgba(255,255,255,.08) inset;
      pointer-events: auto;
      cursor: grab;
      transition: transform 70ms linear, box-shadow 90ms ease;
    }
    .mouth.aligning { border-color: rgba(194, 210, 234, 0.78); }
    .mouth.viseme-rest { --mouth-open: 0.22; }
    .mouth.viseme-a { --mouth-open: 0.55; }
    .mouth.viseme-e { --mouth-open: 0.4; }
    .mouth.viseme-o { --mouth-open: 0.66; }
    .mouth.viseme-m { --mouth-open: 0.14; }
    .mouth.viseme-f { --mouth-open: 0.3; }

    .brows {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .brow {
      position: absolute;
      width: var(--brow-w);
      height: var(--brow-h);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(16,18,23,.94), rgba(8,10,12,.95));
      border: 1px solid rgba(255,255,255,.5);
      box-shadow:
        0 0 0 1px rgba(0,0,0,.55) inset,
        0 1px 6px rgba(0,0,0,.55);
      transform-origin: center;
      pointer-events: auto;
      cursor: grab;
    }
    .brow.left {
      left: calc(var(--brow-x) - var(--brow-gap) / 2);
      top: calc(var(--brow-y) - var(--brow-lift));
      transform: translate(-50%, -50%) rotate(var(--brow-rot-left, -6deg));
    }
    .brow.right {
      left: calc(var(--brow-x) + var(--brow-gap) / 2);
      top: calc(var(--brow-y) - var(--brow-lift));
      transform: translate(-50%, -50%) rotate(var(--brow-rot-right, 6deg));
    }
    .brows.style-straight { --brow-rot-left: 0deg; --brow-rot-right: 0deg; }
    .brows.style-arched { --brow-rot-left: -11deg; --brow-rot-right: 11deg; }
    .brows.style-angry { --brow-rot-left: 14deg; --brow-rot-right: -14deg; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="hint">Avatar Popup • drag mouth/brows • lip-sync</div>
    <div class="align-panel">
      <strong>Avatar Rig Controls</strong>

      <div class="group-title">Mouth</div>
      <div class="row"><span>X</span><input id="mx" type="range" min="10" max="90" step="0.1" /><span id="mxv">50.0%</span></div>
      <div class="row"><span>Y</span><input id="my" type="range" min="10" max="95" step="0.1" /><span id="myv">74.0%</span></div>
      <div class="row"><span>W</span><input id="mw" type="range" min="6" max="60" step="0.1" /><span id="mwv">24.0%</span></div>
      <div class="row"><span>H</span><input id="mh" type="range" min="4" max="30" step="0.1" /><span id="mhv">10.0%</span></div>

      <div class="group-title">Eyebrows</div>
      <div class="row"><span>S</span>
        <select id="bs">
          <option value="straight">Straight</option>
          <option value="arched">Arched</option>
          <option value="angry">Angry</option>
        </select>
        <span></span>
      </div>
      <div class="row"><span>X</span><input id="bx" type="range" min="10" max="90" step="0.1" /><span id="bxv">50.0%</span></div>
      <div class="row"><span>Y</span><input id="by" type="range" min="5" max="70" step="0.1" /><span id="byv">33.0%</span></div>
      <div class="row"><span>W</span><input id="bw" type="range" min="4" max="24" step="0.1" /><span id="bwv">12.0%</span></div>
      <div class="row"><span>H</span><input id="bh" type="range" min="0.6" max="6" step="0.1" /><span id="bhv">2.2%</span></div>
      <div class="row"><span>G</span><input id="bg" type="range" min="6" max="50" step="0.1" /><span id="bgv">24.0%</span></div>

      <div class="actions">
        <button id="resetAll" type="button">Reset All</button>
        <button id="toggleUi" type="button">Hide UI</button>
      </div>
      <div class="align-note">Tip: drag mouth and brows directly on the image for fast alignment.</div>
    </div>

    <div class="avatar-wrap" id="wrap">
      <img id="avatar" alt="Avatar" />
      <div class="brows style-straight" id="brows"><div class="brow left" id="browLeft"></div><div class="brow right" id="browRight"></div></div>
      <div class="mouth viseme-rest aligning" id="mouth"></div>
    </div>
  </div>
  <button id="uiFab" class="ui-toggle-fab" type="button">Hide UI</button>

  <script>
    const wrap = document.getElementById('wrap');
    const mouth = document.getElementById('mouth');
    const brows = document.getElementById('brows');
    const browLeft = document.getElementById('browLeft');
    const browRight = document.getElementById('browRight');
    const avatar = document.getElementById('avatar');
    const root = document.documentElement;

    const MOUTH_KEY = 'cohost_mouth_align_v1';
    const BROW_KEY = 'cohost_brow_align_v1';
    const BROW_STYLE_KEY = 'cohost_brow_style_v1';

    const ids = (name) => {
      const input = document.getElementById(name);
      const view = document.getElementById(`${name}v`);
      return [input, view];
    };

    const [mx, mxv] = ids('mx');
    const [my, myv] = ids('my');
    const [mw, mwv] = ids('mw');
    const [mh, mhv] = ids('mh');

    const bs = document.getElementById('bs');
    const [bx, bxv] = ids('bx');
    const [by, byv] = ids('by');
    const [bw, bwv] = ids('bw');
    const [bh, bhv] = ids('bh');
    const [bg, bgv] = ids('bg');

    const resetAll = document.getElementById('resetAll');
    const toggleUi = document.getElementById('toggleUi');
    const uiFab = document.getElementById('uiFab');
    let avatarChannel = null;

    const defaults = {
      mouth: { x: 50, y: 74, w: 24, h: 10 },
      brows: { x: 50, y: 33, w: 12, h: 2.2, g: 24 },
      browStyle: 'straight'
    };

    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

    function readJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return { ...fallback };
        return { ...fallback, ...JSON.parse(raw) };
      } catch {
        return { ...fallback };
      }
    }

    function readMouth() {
      const a = readJson(MOUTH_KEY, defaults.mouth);
      return { x: clamp(+a.x, 10, 90), y: clamp(+a.y, 10, 95), w: clamp(+a.w, 6, 60), h: clamp(+a.h, 4, 30) };
    }
    function readBrows() {
      const a = readJson(BROW_KEY, defaults.brows);
      return { x: clamp(+a.x, 10, 90), y: clamp(+a.y, 5, 70), w: clamp(+a.w, 4, 24), h: clamp(+a.h, 0.6, 6), g: clamp(+a.g, 6, 50) };
    }

    function applyMouth(a) {
      root.style.setProperty('--mouth-x', `${a.x}%`);
      root.style.setProperty('--mouth-y', `${a.y}%`);
      root.style.setProperty('--mouth-w', `${a.w}%`);
      root.style.setProperty('--mouth-h', `${a.h}%`);
      mx.value = String(a.x); my.value = String(a.y); mw.value = String(a.w); mh.value = String(a.h);
      mxv.textContent = `${a.x.toFixed(1)}%`; myv.textContent = `${a.y.toFixed(1)}%`; mwv.textContent = `${a.w.toFixed(1)}%`; mhv.textContent = `${a.h.toFixed(1)}%`;
    }
    function applyBrows(a) {
      root.style.setProperty('--brow-x', `${a.x}%`);
      root.style.setProperty('--brow-y', `${a.y}%`);
      root.style.setProperty('--brow-w', `${a.w}%`);
      root.style.setProperty('--brow-h', `${a.h}%`);
      root.style.setProperty('--brow-gap', `${a.g}%`);
      bx.value = String(a.x); by.value = String(a.y); bw.value = String(a.w); bh.value = String(a.h); bg.value = String(a.g);
      bxv.textContent = `${a.x.toFixed(1)}%`; byv.textContent = `${a.y.toFixed(1)}%`; bwv.textContent = `${a.w.toFixed(1)}%`; bhv.textContent = `${a.h.toFixed(1)}%`; bgv.textContent = `${a.g.toFixed(1)}%`;
    }

    function setBrowStyle(style) {
      const val = ['straight', 'arched', 'angry'].includes(style) ? style : 'straight';
      brows.classList.remove('style-straight', 'style-arched', 'style-angry');
      brows.classList.add(`style-${val}`);
      bs.value = val;
      localStorage.setItem(BROW_STYLE_KEY, val);
    }

    function saveAlign(type, key, align) {
      localStorage.setItem(key, JSON.stringify(align));
      try {
        if (avatarChannel) avatarChannel.postMessage({ type, align });
      } catch {}
    }

    function updateMouth(patch) {
      const next = { ...readMouth(), ...patch };
      applyMouth(next);
      saveAlign('mouth_align', MOUTH_KEY, next);
    }
    function updateBrows(patch) {
      const next = { ...readBrows(), ...patch };
      applyBrows(next);
      saveAlign('brow_align', BROW_KEY, next);
    }

    function loadImage() {
      const src = localStorage.getItem('cohost_avatar_image');
      if (src) avatar.src = src;
    }

    const VISEMES = ['rest', 'a', 'e', 'o', 'm', 'f'];
    let speakingUntil = 0;
    let sequence = [];
    let seqIndex = 0;
    let nextStepAt = 0;

    function setViseme(v) {
      for (const key of VISEMES) mouth.classList.remove(`viseme-${key}`);
      mouth.classList.add(`viseme-${v}`);
    }
    function mapCharToViseme(ch) {
      const c = ch.toLowerCase();
      if ('aei'.includes(c)) return 'e';
      if ('ou'.includes(c)) return 'o';
      if ('mbp'.includes(c)) return 'm';
      if ('fv'.includes(c)) return 'f';
      if ('rnltdkgszhcjxyqw'.includes(c)) return 'a';
      return 'rest';
    }
    function buildSequence(text) {
      const chars = (text || '').replace(/\s+/g, ' ').slice(0, 220);
      const seq = [];
      for (const ch of chars) seq.push({ v: mapCharToViseme(ch), dur: ch === ' ' ? 50 : (52 + Math.floor(Math.random() * 45)) });
      if (!seq.length) ['a', 'e', 'o', 'm', 'a', 'f'].forEach((v) => seq.push({ v, dur: 90 }));
      return seq;
    }
    function startSpeaking(text) {
      sequence = buildSequence(text);
      seqIndex = 0;
      nextStepAt = 0;
      const est = sequence.reduce((sum, s) => sum + s.dur, 0);
      speakingUntil = Date.now() + Math.max(900, Math.min(8000, est + 180));
      wrap.classList.add('speaking');
    }
    function stopSpeaking() {
      speakingUntil = 0;
      sequence = [];
      seqIndex = 0;
      nextStepAt = 0;
      wrap.classList.remove('speaking');
      setViseme('rest');
      root.style.setProperty('--brow-lift', '0%');
    }

    function tick(now) {
      if (now < speakingUntil) {
        if (now >= nextStepAt) {
          const step = sequence[seqIndex] || { v: 'rest', dur: 80 };
          setViseme(step.v);
          nextStepAt = now + step.dur;
          seqIndex = (seqIndex + 1) % Math.max(1, sequence.length);
        }
        const wobble = 0.55 + Math.abs(Math.sin(now / 95)) * 0.75;
        root.style.setProperty('--brow-lift', `${wobble.toFixed(2)}%`);
        wrap.classList.add('speaking');
      } else {
        wrap.classList.remove('speaking');
        root.style.setProperty('--brow-lift', '0%');
        setViseme('rest');
      }
      requestAnimationFrame(tick);
    }

    function dragAnchor(el, updater, clampY = [10, 90]) {
      let dragging = false;
      function toPct(clientX, clientY) {
        const r = wrap.getBoundingClientRect();
        if (!r.width || !r.height) return null;
        return {
          x: clamp(((clientX - r.left) / r.width) * 100, 10, 90),
          y: clamp(((clientY - r.top) / r.height) * 100, clampY[0], clampY[1])
        };
      }
      el.addEventListener('pointerdown', (e) => {
        dragging = true;
        el.setPointerCapture(e.pointerId);
        const p = toPct(e.clientX, e.clientY); if (p) updater(p);
      });
      el.addEventListener('pointermove', (e) => {
        if (!dragging) return;
        const p = toPct(e.clientX, e.clientY); if (p) updater(p);
      });
      el.addEventListener('pointerup', (e) => {
        dragging = false;
        try { el.releasePointerCapture(e.pointerId); } catch {}
      });
      el.addEventListener('pointercancel', () => { dragging = false; });
    }

    function applyUiHidden(hidden) {
      document.body.classList.toggle('ui-hidden', hidden);
      toggleUi.textContent = hidden ? 'Show UI' : 'Hide UI';
      uiFab.textContent = hidden ? 'Show Controls' : 'Hide Controls';
      localStorage.setItem('cohost_avatar_ui_hidden_v1', hidden ? '1' : '0');
    }

    loadImage();
    applyMouth(readMouth());
    applyBrows(readBrows());
    setBrowStyle(localStorage.getItem(BROW_STYLE_KEY) || defaults.browStyle);

    mx.addEventListener('input', () => updateMouth({ x: +mx.value }));
    my.addEventListener('input', () => updateMouth({ y: +my.value }));
    mw.addEventListener('input', () => updateMouth({ w: +mw.value }));
    mh.addEventListener('input', () => updateMouth({ h: +mh.value }));

    bx.addEventListener('input', () => updateBrows({ x: +bx.value }));
    by.addEventListener('input', () => updateBrows({ y: +by.value }));
    bw.addEventListener('input', () => updateBrows({ w: +bw.value }));
    bh.addEventListener('input', () => updateBrows({ h: +bh.value }));
    bg.addEventListener('input', () => updateBrows({ g: +bg.value }));
    bs.addEventListener('change', () => setBrowStyle(bs.value));

    resetAll.addEventListener('click', () => {
      applyMouth(defaults.mouth); saveAlign('mouth_align', MOUTH_KEY, defaults.mouth);
      applyBrows(defaults.brows); saveAlign('brow_align', BROW_KEY, defaults.brows);
      setBrowStyle(defaults.browStyle);
    });

    applyUiHidden(localStorage.getItem('cohost_avatar_ui_hidden_v1') === '1');
    toggleUi.addEventListener('click', () => applyUiHidden(!document.body.classList.contains('ui-hidden')));
    uiFab.addEventListener('click', () => applyUiHidden(!document.body.classList.contains('ui-hidden')));
    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'h') applyUiHidden(!document.body.classList.contains('ui-hidden'));
    });

    dragAnchor(mouth, (p) => updateMouth({ x: p.x, y: p.y }), [10, 95]);
    dragAnchor(browLeft, (p) => updateBrows({ x: p.x, y: p.y }), [5, 70]);
    dragAnchor(browRight, (p) => updateBrows({ x: p.x, y: p.y }), [5, 70]);

    window.addEventListener('storage', (e) => {
      if (e.key === 'cohost_avatar_image') loadImage();
      if (e.key === MOUTH_KEY) applyMouth(readMouth());
      if (e.key === BROW_KEY) applyBrows(readBrows());
      if (e.key === BROW_STYLE_KEY) setBrowStyle(localStorage.getItem(BROW_STYLE_KEY) || defaults.browStyle);
    });

    if ('BroadcastChannel' in window) {
      avatarChannel = new BroadcastChannel('cohost-avatar-events');
      avatarChannel.onmessage = (event) => {
        const msg = event.data || {};
        if (msg.type === 'speak' || msg.type === 'speak_start') startSpeaking(typeof msg.text === 'string' ? msg.text : '');
        if (msg.type === 'speak_stop') stopSpeaking();
        if (msg.type === 'set_mouth_align' && msg.align) updateMouth(msg.align);
        if (msg.type === 'set_brow_align' && msg.align) updateBrows(msg.align);
      };
    }

    requestAnimationFrame(tick);
  </script>
</body>
</html>
